<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asmau's Technologies – Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card shadow-lg login-card">
            <div class="card-header bg-gradient-primary text-white text-center py-3">
                <h4><i class="fas fa-graduation-cap me-2"></i>ASMAU Technologies</h4>
                <small>Student Result Management System</small>
            </div>
            <div class="card-body p-4">
                <form id="loginForm" novalidate>
                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="fas fa-envelope me-2"></i>Email</label>
                        <input type="email" id="email" class="form-control" placeholder="your@email.com" required>
                        <div class="invalid-feedback">Please enter a valid email address.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="fas fa-lock me-2"></i>Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Password" required>
                        <div class="invalid-feedback">Password is required.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="fas fa-user-tag me-2"></i>Login as</label>
                        <select id="role" class="form-select">
                            <option value="student">Student</option>
                            <option value="lecturer">Lecturer</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-gradient-primary w-100 py-2">
                        <i class="fas fa-sign-in-alt me-2"></i> Login
                    </button>
                </form>
                <hr>
                <p class="text-center mb-0">Don't have an account? <a href="register.html" class="fw-bold">Register</a></p>
               
            </div>
        </div>
    </div>

    <!-- Error Modal -->
    <div class="modal fade" id="loginErrorModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                    <h5 class="modal-title"><i class="fas fa-exclamation-triangle me-2"></i>Login Failed</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="loginErrorMessage">
                    Invalid email or password.
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Try Again</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
